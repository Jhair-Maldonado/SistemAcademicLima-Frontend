<button (click)="toggleChat()" 
  class="fixed bottom-6 right-6 h-14 w-14 bg-orange-500 hover:bg-orange-600 rounded-full shadow-[0_0_20px_rgba(249,115,22,0.4)] flex items-center justify-center text-white transition-all duration-300 z-50 active:scale-95 group">
  <i class="fa-solid" [ngClass]="isOpen ? 'fa-xmark text-2xl' : 'fa-robot text-2xl group-hover:animate-pulse'"></i>
</button>

<div *ngIf="isOpen" 
  class="fixed bottom-24 right-6 w-96 h-[500px] z-50 flex flex-col bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden shadow-2xl font-sans animate-in slide-in-from-bottom-8 fade-in duration-300">
  
  <div class="bg-gradient-to-r from-slate-900 to-blue-900/40 border-b border-slate-800 p-4 flex justify-between items-center relative overflow-hidden">
    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl pointer-events-none"></div>
    
    <div class="flex items-center relative z-10">
      <div class="h-10 w-10 rounded-xl bg-blue-500/10 border border-blue-500/30 flex items-center justify-center mr-3 relative">
        <i class="fa-solid fa-wand-magic-sparkles text-blue-400"></i>
        <div class="absolute -bottom-1 -right-1 h-3.5 w-3.5 bg-green-400 border-2 border-slate-900 rounded-full"></div>
      </div>
      <div>
        <h3 class="text-white font-bold text-sm tracking-wide">EduCore Assistant</h3>
        <p class="text-[10px] text-blue-400 font-medium uppercase tracking-wider">
          Perfil: {{ userRole }}
        </p>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-5 scroll-smooth bg-slate-950/50">
    <div *ngFor="let msg of messages" class="flex flex-col" [ngClass]="{'items-end': msg.role === 'user', 'items-start': msg.role === 'assistant'}">
      
      <div class="max-w-[85%] rounded-2xl p-3.5 text-sm shadow-md"
        [ngClass]="{
          'bg-blue-600 text-white rounded-tr-sm': msg.role === 'user',
          'bg-slate-800 border border-slate-700 text-slate-200 rounded-tl-sm': msg.role === 'assistant'
        }">
        
        <div *ngIf="msg.contextUsed" class="mb-2 flex flex-wrap gap-1.5">
          <span *ngFor="let doc of msg.contextUsed" class="text-[9px] bg-orange-500/10 text-orange-400 border border-orange-500/20 px-2 py-0.5 rounded-full flex items-center">
            <i class="fa-solid fa-file-pdf mr-1"></i> {{ doc }}
          </span>
        </div>
        <p class="leading-relaxed" [innerHTML]="msg.content"></p>
      </div>
      <span class="text-[9px] text-slate-500 mt-1.5 font-semibold">{{ msg.timestamp }}</span>
    </div>

    <div *ngIf="isTyping" class="flex items-start">
      <div class="bg-slate-800 border border-slate-700 rounded-2xl rounded-tl-sm p-4 flex space-x-1.5">
        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></div>
        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
      </div>
    </div>
  </div>

  <div class="p-3 bg-slate-900 border-t border-slate-800">
    <div class="relative flex items-center">
      <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
        placeholder="Consulta a la IA..."
        class="w-full bg-slate-950 border border-slate-700 rounded-xl py-2.5 pl-4 pr-10 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors shadow-inner">
      <button (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping"
        class="absolute right-1.5 p-1.5 text-orange-500 hover:bg-orange-500 hover:text-white rounded-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed">
        <i class="fa-solid fa-paper-plane text-sm"></i>
      </button>
    </div>
  </div>

</div>
